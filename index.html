<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Todo Treasure Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-container">
        <article class="todo-card" data-testid="test-todo-card">
            <!-- Header with title and status -->
            <div class="card-header">
                <div class="title-section">
                    <div class="todo-header">
                        <h2 class="todo-title" data-testid="test-todo-title">Review Project Proposal</h2>
                        <div class="tags-section">
                            <ul class="tags-list" role="list" data-testid="test-todo-tags">
                                <li data-testid="test-todo-tag-work" class="tag">Work</li>
                                <li class="tag" data-testid="test-todo-tag-important">Important</li>
                                <li data-testid="test-todo-tag-urgent" class="tag urgent-tag">Urgent</li>
                            </ul>
                        </div>
                    </div>


                    <div class="card-info">
                        <span class="status-badge" data-testid="test-todo-status">
                            Pending
                        </span>
                        <div class="due-date">
                            <span class="label">Due:</span>
                            <time class="due-date-value" data-testid="test-todo-due-date"
                                datetime="2026-04-15T18:00:00">April
                                15, 2026</time>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Description -->
            <p class="todo-description" data-testid="test-todo-description">
                Review the Q2 project proposal and provide feedback to the team by end of day.
            </p>

            <!-- Priority badge -->
            <div class="priority-wrapper">
                <span class="priority-badge high" data-testid="test-todo-priority">High Priority</span>
            </div>

            <!-- Due date & time remaining -->
            <div class="due-info">
                <div class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">
                    Calculating...
                </div>
            </div>

            <!-- Complete toggle -->
            <div class="complete-section">
                <label class="checkbox-label">
                    <input type="checkbox" class="complete-checkbox" data-testid="test-todo-complete-toggle">
                    <span class="checkbox-text">Mark as complete</span>
                </label>
            </div>

            <!-- Action buttons -->
            <div class="action-buttons">
                <button class="edit-btn" data-testid="test-todo-edit-button" aria-label="Edit task">
                    Edit
                </button>
                <button class="delete-btn" data-testid="test-todo-delete-button" aria-label="Delete task">
                    Delete
                </button>
            </div>

            <!-- Edit Form (Hidden by default) -->
            <div class="edit-form" data-testid="test-todo-edit-form" style="display: none;">
                <h3>Edit Task</h3>

                <label for="edit-title-input">Title:</label>
                <input type="text" id="edit-title-input" data-testid="test-todo-edit-title-input">

                <label for="edit-desc-input">Description:</label>
                <textarea id="edit-desc-input" data-testid="test-todo-edit-description-input"></textarea>

                <label for="edit-priority-select">Priority:</label>
                <select id="edit-priority-select" data-testid="test-todo-edit-priority-select">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>

                <label for="edit-due-date">Due Date:</label>
                <input type="date" id="edit-due-date" data-testid="test-todo-edit-due-date-input">

                <div class="edit-buttons">
                    <button data-testid="test-todo-save-button">Save</button>
                    <button data-testid="test-todo-cancel-button">Cancel</button>
                </div>
            </div>
        </article>
    </div>
    <script src="script.js"></script>
</body>

</html>
